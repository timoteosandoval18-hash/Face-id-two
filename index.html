<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Face Scan HUD</title>
<style>
  body { margin: 0; background: #000; overflow: hidden; }
  canvas { position: absolute; }
  video { display: none; }
  .hud {
    position: absolute; top: 20px; left: 20px;
    color: #fff; font-family: monospace; font-size: 14px;
    text-shadow: 0 0 5px #fff; z-index: 10;
  }
  .scan-line {
    position: absolute; width: 100%; height: 2px;
    background: linear-gradient(90deg, transparent, #fff, transparent);
    animation: scan 3s linear infinite; opacity: 0.4; z-index: 10;
  }
  @keyframes scan { 0% { top: 0%; } 100% { top: 100%; } }
</style>
<script src="https://cdn.jsdelivr.net/npm/@mediapipe/camera_utils/camera_utils.js"></script>
<script src="https://cdn.jsdelivr.net/npm/@mediapipe/face_mesh/face_mesh.js"></script>
</head>
<body>
<div class="hud">
  <div>SCANNING...</div>
  <div>ANALYZING BIOMETRICS</div>
  <div id="status">FACE ID: SEARCHING</div>
<div class="scan-line"></div>
<video id="video"></video>
<canvas id="canvas"></canvas>

<script>
const video = document.getElementById('video');
const canvas = document.getElementById('canvas');
const ctx = canvas.getContext('2d');
const statusText = document.getElementById('status');

function onResults(results) {
  canvas.width = window.innerWidth;
  canvas.height = window.innerHeight;
  ctx.fillStyle = '#000';
  ctx.fillRect(0, 0, canvas.width, canvas.height);

  if (results.multiFaceLandmarks.length > 0) {
    statusText.textContent = 'FACE ID: MATCH FOUND';
    for (const landmarks of results.multiFaceLandmarks) {
      ctx.fillStyle = '#fff';
      ctx.shadowBlur = 6;
      ctx.shadowColor = '#fff';
      for (const landmark of landmarks) {
        const x = landmark.x * canvas.width;
        const y = landmark.y * canvas.height;
        ctx.beginPath();
        ctx.arc(x, y, 0.8, 0, 2 * Math.PI); // <- Aquí ajustas el tamaño
        ctx.fill();
      }
      ctx.shadowBlur = 0;
    }
  } else {
    statusText.textContent = 'FACE ID: SEARCHING';
  }
}

const faceMesh = new FaceMesh({locateFile: (file) => {
  return `https://cdn.jsdelivr.net/npm/@mediapipe/face_mesh/${file}`;
}});
faceMesh.setOptions({ maxNumFaces: 1, refineLandmarks: true });
faceMesh.onResults(onResults);

const camera = new Camera(video, {
  onFrame: async () => { await faceMesh.send({image: video}); },
  width: 1280, height: 720
});
camera.start();
</script>
</body>
  </html>
